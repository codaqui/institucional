name: PR Preview Cleanup

on:
  pull_request_target:
    types:
      - closed

concurrency:
  group: pr-preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-preview:
    name: Cleanup PR preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Remove preview files
        id: cleanup
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C gh-pages pull --rebase origin gh-pages

          PREVIEW_PATH="gh-pages/previews/pr-${PR_NUMBER}"

          if [ ! -d "$PREVIEW_PATH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf "$PREVIEW_PATH"
          find gh-pages/previews -type d -empty -delete 2>/dev/null || true

          git -C gh-pages add -A previews

          if git -C gh-pages diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C gh-pages commit -m "chore: remove PR preview #${PR_NUMBER}"

          for attempt in 1 2 3; do
            if git -C gh-pages push origin HEAD:gh-pages; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Preview cleanup push failed after retries" >&2
              exit 1
            fi

            git -C gh-pages pull --rebase origin gh-pages
          done

      - name: Remove preview comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ github.event.pull_request.number }}
          header: pr-preview
          delete: true
