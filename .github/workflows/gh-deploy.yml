name: Deploy Environment

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.branch_check.outputs.env_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deploy branch
        id: branch_check
        run: |
          echo "Running on branch ${{ github.ref }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_name=gh-pages" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "env_name=gh-pages-develop" >> $GITHUB_OUTPUT
          else
            echo "env_name=gh-pages-feature" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Ensure .nojekyll exists
        run: touch build/.nojekyll

      - name: Deploy to GitHub Pages (main) 🚀
        if: steps.branch_check.outputs.env_name == 'gh-pages'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          clean-exclude: |
            previews

      - name: Deploy to GitHub Pages (develop) 🚀
        if: steps.branch_check.outputs.env_name != 'gh-pages'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: ${{ steps.branch_check.outputs.env_name }}

  notify:
    name: Notify Merged PR
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - name: Find associated merged PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = prs.find(pr => pr.merged_at !== null);
            if (merged) {
              core.info(`Found merged PR #${merged.number}`);
              return String(merged.number);
            }
            core.info('No merged PR found for this commit');
            return '';

      - name: Comment on merged PR
        if: steps.find-pr.outputs.result != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.find-pr.outputs.result }}
          header: deploy-status
          message: |
            ## 🚀 Deployed Successfully!

            This PR has been deployed to GitHub Pages.

            | | |
            |---|---|
            | **Branch** | `${{ github.ref_name }}` |
            | **Environment** | `${{ needs.build-and-deploy.outputs.env_name }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Run** | [View deployment](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
