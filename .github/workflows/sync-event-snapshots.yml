name: Sync Event Snapshots

on:
  workflow_dispatch:
    inputs:
      full_consolidation:
        description: "Full consolidation (re-paginate all past events)"
        type: boolean
        default: false
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-event-snapshots
  cancel-in-progress: true

jobs:
  sync:
    name: Sync snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate event snapshots
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          FULL_CONSOLIDATION: ${{ inputs.full_consolidation || 'false' }}
        run: npm run sync:events

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/events

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: sync event snapshots"
          git push
