name: PR Check

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  build:
    name: Build & Upload Preview
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        id: build
        run: |
          SITE_URL="https://codaqui.dev" \
          BASE_URL="/previews/pr-${{ github.event.pull_request.number }}/" \
          PREVIEW="true" \
          PREVIEW_PR_NUMBER="${{ github.event.pull_request.number }}" \
          npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: preview-site
          path: build/
          retention-days: 7

      - name: Post build success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: build-status
          message: |
            ## ✅ Build Successful

            O site Docusaurus compilou com sucesso para este PR.

            | | |
            |---|---|
            | **Commit** | `${{ github.sha }}` |
            | **Artifact** | disponível por 7 dias na aba Actions |
            | **Run** | [Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

      - name: Post build failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: build-status
          message: |
            ## ❌ Build Falhou

            O build do Docusaurus falhou neste PR. Verifique os logs antes de fazer merge.

            | | |
            |---|---|
            | **Commit** | `${{ github.sha }}` |
            | **Run** | [Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-site
          path: build/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          configPath: .github/lighthouserc.json
          budgetPath: .github/lighthouse-budget.json
