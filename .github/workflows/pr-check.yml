name: PR Check

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve PR metadata
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      reuse_develop_preview: ${{ steps.meta.outputs.reuse_develop_preview }}
    steps:
      - name: Detect develop-to-main PR
        id: meta
        env:
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$PR_BASE" = "main" ] && [ "$PR_HEAD" = "develop" ]; then
            echo "reuse_develop_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "reuse_develop_preview=false" >> "$GITHUB_OUTPUT"
          fi

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-slim
    needs: metadata
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-slim
    needs: metadata
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Frontend Tests with Coverage
        run: npx jest --config jest.config.ts --coverage --coverageReporters=json-summary --coverageReporters=text 2>&1 | tee frontend-coverage.txt

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: |
            frontend-coverage.txt
            coverage/coverage-summary.json
          retention-days: 3

  backend-check:
    name: Backend CI
    runs-on: ubuntu-slim
    needs: metadata
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Build
        working-directory: ./backend
        run: npm run build

      - name: Run Backend Tests with Coverage
        working-directory: ./backend
        run: npx jest --coverage --coverageReporters=json-summary --coverageReporters=text 2>&1 | tee backend-coverage.txt

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            backend/backend-coverage.txt
            backend/coverage/coverage-summary.json
          retention-days: 3

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy (frontend — vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: 'backend,node_modules,build,old-docs-backup'

      - name: Upload frontend scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

      - name: Run Trivy (backend — vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: 'node_modules'
          skip-setup-trivy: true

      - name: Upload backend scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-slim
    needs:
      - frontend-tests
      - backend-check
    if: always() && !cancelled()
    permissions:
      pull-requests: write
    steps:
      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: frontend-cov/
        continue-on-error: true

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: backend-cov/
        continue-on-error: true

      - name: Generate coverage comment
        id: coverage
        run: |
          {
            echo "## 📊 Test Coverage Report"
            echo ""

            # Frontend
            if [ -f frontend-cov/coverage/coverage-summary.json ]; then
              FE_STMTS=$(jq -r '.total.statements.pct' frontend-cov/coverage/coverage-summary.json)
              FE_BRANCH=$(jq -r '.total.branches.pct' frontend-cov/coverage/coverage-summary.json)
              FE_FUNCS=$(jq -r '.total.functions.pct' frontend-cov/coverage/coverage-summary.json)
              FE_LINES=$(jq -r '.total.lines.pct' frontend-cov/coverage/coverage-summary.json)
              echo "### Frontend"
              echo ""
              echo "| Statements | Branches | Functions | Lines |"
              echo "|:---:|:---:|:---:|:---:|"
              echo "| ${FE_STMTS}% | ${FE_BRANCH}% | ${FE_FUNCS}% | ${FE_LINES}% |"
              echo ""
            else
              echo "### Frontend"
              echo "⚠️ Coverage data not available"
              echo ""
            fi

            # Backend
            if [ -f backend-cov/coverage/coverage-summary.json ]; then
              BE_STMTS=$(jq -r '.total.statements.pct' backend-cov/coverage/coverage-summary.json)
              BE_BRANCH=$(jq -r '.total.branches.pct' backend-cov/coverage/coverage-summary.json)
              BE_FUNCS=$(jq -r '.total.functions.pct' backend-cov/coverage/coverage-summary.json)
              BE_LINES=$(jq -r '.total.lines.pct' backend-cov/coverage/coverage-summary.json)
              echo "### Backend"
              echo ""
              echo "| Statements | Branches | Functions | Lines |"
              echo "|:---:|:---:|:---:|:---:|"
              echo "| ${BE_STMTS}% | ${BE_BRANCH}% | ${BE_FUNCS}% | ${BE_LINES}% |"
              echo ""
            else
              echo "### Backend"
              echo "⚠️ Coverage data not available"
              echo ""
            fi

            echo "---"
            echo "<sub>Generated by PR Check workflow</sub>"
          } > coverage-comment.md

          cat coverage-comment.md

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          path: coverage-comment.md

  build:
    name: Build & Upload Preview
    runs-on: ubuntu-latest
    needs:
      - metadata
      - typecheck
      - frontend-tests
      - backend-check
    if: needs.metadata.outputs.reuse_develop_preview != 'true'
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        id: build
        run: |
          SITE_URL="https://codaqui.dev" \
          BASE_URL="/previews/pr-${{ github.event.pull_request.number }}/" \
          PREVIEW="true" \
          PREVIEW_PR_NUMBER="${{ github.event.pull_request.number }}" \
          STRIPE_PUBLISHABLE_KEY="${{ vars.STRIPE_PUBLISHABLE_KEY }}" \
          npm run build

      - name: Override robots for preview artifact
        run: |
          cat <<'EOF' > build/robots.txt
          User-agent: *
          Disallow: /
          EOF

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: preview-site
          path: build/
          retention-days: 7

      - name: Post build success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: build-status
          message: |
            ## ✅ Build Successful

            O site Docusaurus compilou com sucesso para este PR.

            | | |
            |---|---|
            | **Commit** | `${{ github.sha }}` |
            | **Artifact** | disponível por 7 dias na aba Actions |
            | **Run** | [Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

      - name: Post build failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: build-status
          message: |
            ## ❌ Build Falhou

            O build do Docusaurus falhou neste PR. Verifique os logs antes de fazer merge.

            | | |
            |---|---|
            | **Commit** | `${{ github.sha }}` |
            | **Run** | [Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: needs.metadata.outputs.reuse_develop_preview != 'true'
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-site
          path: build/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          configPath: .github/lighthouserc.json
          budgetPath: .github/lighthouse-budget.json

  reuse-develop-preview:
    name: Reuse develop preview
    runs-on: ubuntu-slim
    needs:
      - metadata
      - typecheck
      - frontend-tests
      - backend-check
    if: needs.metadata.outputs.reuse_develop_preview == 'true'
    permissions:
      pull-requests: write
    steps:
      - name: Comment reused preview URL
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: build-status
          message: |
            ## ✅ Build reutilizado

            Este PR é `develop -> main`, então reutilizamos o preview contínuo da branch `develop` em vez de gerar um preview dedicado.

            | | |
            |---|---|
            | **URL** | [https://codaqui.dev/previews/develop/](https://codaqui.dev/previews/develop/) |
            | **Commit** | `${{ github.sha }}` |
            | **Observação** | TypeScript check executado; preview e Lighthouse dedicados foram pulados |
