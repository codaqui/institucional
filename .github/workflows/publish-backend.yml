name: "CD: Publish Backend & Push GHCR"

on:
  workflow_dispatch:

env:
  VERSION: "latest" # Será sobrescrito no step

jobs:
  publish-image:
    name: "Publish Docker Img"
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64/v8]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Read Version
        id: version
        # Extrai a versão a partir do package.json do backend
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        run: |
          # O build context será ./backend para copiar o package.json e src do NestJS
          IMAGE_NAME="ghcr.io/${{ github.repository }}-backend"
          
          # GitHub converte o nome em minúsculo
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ matrix.platform }}" == "linux/amd64" ]; then
            docker buildx build --platform ${{ matrix.platform }} \
              -t $IMAGE_NAME:${{ env.VERSION }}-amd64 \
              -t $IMAGE_NAME:latest-amd64 \
              -t $IMAGE_NAME:${{ env.VERSION }} \
              -t $IMAGE_NAME:latest \
              --push ./backend
          elif [ "${{ matrix.platform }}" == "linux/arm64/v8" ]; then
            docker buildx build --platform ${{ matrix.platform }} \
              -t $IMAGE_NAME:${{ env.VERSION }}-arm64-v8 \
              -t $IMAGE_NAME:latest-arm64-v8 \
              --push ./backend
          fi

  create-release:
    needs: publish-image
    name: "Create GitHub Release"
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Read Version
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Extract Release Notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md | awk -v ver="${{ env.VERSION }}" '
              index($0, "## [" ver "]") == 1 {flag=1; next}
              /^## \[/ && flag {flag=0}
              flag {print}
            ' > RELEASE_NOTES.md
          else
            echo "Release da versão ${{ env.VERSION }} do backend." > RELEASE_NOTES.md
          fi
          
          echo "==== Extracted Notes ===="
          cat RELEASE_NOTES.md
          echo "========================="
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-backend
          name: Backend Versão ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
