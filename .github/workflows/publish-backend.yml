name: "CD: Publish Backend & Push GHCR"

on:
  workflow_dispatch:

env:
  VERSION: "latest" # Será sobrescrito no step

jobs:
  publish-image:
    name: "Publish Docker Img"
    permissions:
      contents: read
      packages: write
      security-events: write
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64/v8]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Read Version
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: image_meta
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository }}-backend"
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

          if [ "${{ matrix.platform }}" == "linux/amd64" ]; then
            TAGS="-t $IMAGE_NAME:${{ env.VERSION }}-amd64 -t $IMAGE_NAME:latest-amd64 -t $IMAGE_NAME:${{ env.VERSION }} -t $IMAGE_NAME:latest"
          else
            TAGS="-t $IMAGE_NAME:${{ env.VERSION }}-arm64-v8 -t $IMAGE_NAME:latest-arm64-v8"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (load locally for scan)
        run: |
          docker buildx build --platform ${{ matrix.platform }} \
            --load \
            -t trivy-scan-target:local \
            ./backend

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'trivy-scan-target:local'
          format: 'sarif'
          output: 'trivy-image.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret'

      - name: Upload image scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image-${{ matrix.platform }}'

      - name: Build and push Docker image
        run: |
          docker buildx build --platform ${{ matrix.platform }} \
            ${{ steps.image_meta.outputs.tags }} \
            --push ./backend

  create-release:
    needs: publish-image
    name: "Create GitHub Release"
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Read Version
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Extract Release Notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md | awk -v ver="${{ env.VERSION }}" '
              index($0, "## [" ver "]") == 1 {flag=1; next}
              /^## \[/ && flag {flag=0}
              flag {print}
            ' > RELEASE_NOTES.md
          else
            echo "Release da versão ${{ env.VERSION }} do backend." > RELEASE_NOTES.md
          fi
          
          echo "==== Extracted Notes ===="
          cat RELEASE_NOTES.md
          echo "========================="
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-backend
          name: Backend Versão ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
